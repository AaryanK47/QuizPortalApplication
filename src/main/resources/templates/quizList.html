<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Quiz List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Quiz List</h2>

        <a th:href="@{/addQuiz}" class="btn btn-success">
            Add Quiz
        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Duration (Minutes)</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(quizList)}">

            <td colspan="5" class="text-center text-danger">

                No quizzes available.

            </td>

        </tr>

        <tr th:each="quiz : ${quizList}">

            <td th:text="${quiz.id}"></td>

            <td th:text="${quiz.title}"></td>

            <td th:text="${quiz.category}"></td>

            <td th:text="${quiz.duration}"></td>

            <td>

                <a th:href="@{/editQuiz/{id}(id=${quiz.id})}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a th:href="@{/deleteQuiz/{id}(id=${quiz.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this quiz?');">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/dashboard}" class="btn btn-secondary">

        Back

    </a>

</div>

</body>

</html>
