<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Quiz List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/style.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/dashboard">
            Online Quiz Portal
        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-primary">
                Dashboard
            </a>

            <a href="/"
               class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>Quiz List</h2>

        <a href="/addQuiz"
           class="btn btn-success">

            Add Quiz

        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Duration</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="quiz : ${quizList}">

            <td th:text="${quiz.id}"></td>

            <td th:text="${quiz.title}"></td>

            <td th:text="${quiz.category}"></td>

            <td th:text="${quiz.duration}"></td>

            <td>

                <a th:href="@{/questions/{id}(id=${quiz.id})}"
                   class="btn btn-info btn-sm">

                    Questions

                </a>

                <a th:href="@{/editQuiz/{id}(id=${quiz.id})}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a th:href="@{/deleteQuiz/{id}(id=${quiz.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this quiz?')">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a href="/dashboard"
       class="btn btn-secondary">

        Back

    </a>

</div>

</body>

</html>
