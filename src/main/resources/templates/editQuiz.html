<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            <h2>Edit Quiz</h2>

        </div>

        <div class="card-body">

            <form th:action="@{/updateQuiz}"
                  th:object="${quiz}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label class="form-label">
                        Quiz Title
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{title}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{category}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Duration (Minutes)
                    </label>

                    <input type="number"
                           class="form-control"
                           th:field="*{duration}"
                           min="1"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Update Quiz

                </button>

                <a th:href="@{/quiz}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
