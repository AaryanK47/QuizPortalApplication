<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card">

        <div class="card-header">

            <h2>Add Question</h2>

        </div>

        <div class="card-body">

            <form th:action="@{/saveQuestion}"
                  th:object="${question}"
                  method="post">

                <!-- Hidden Quiz ID -->
                <input type="hidden" th:field="*{quiz.id}">

                <div class="mb-3">
                    <label>Question</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{questionTitle}">
                </div>

                <div class="mb-3">
                    <label>Option 1</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{option1}">
                </div>

                <div class="mb-3">
                    <label>Option 2</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{option2}">
                </div>

                <div class="mb-3">
                    <label>Option 3</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{option3}">
                </div>

                <div class="mb-3">
                    <label>Option 4</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{option4}">
                </div>

                <div class="mb-3">
                    <label>Correct Answer</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{correctAnswer}">
                </div>

                <button type="submit" class="btn btn-success">
                    Save Question
                </button>

                <a th:href="@{/questions/{id}(id=${question.quiz.id})}"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
