<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            Online Quiz Portal
        </a>

        <div>

            <a th:href="@{/quiz}" class="btn btn-primary me-2">
                Manage Quiz
            </a>

            <a th:href="@{/}" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="text-center mb-4">

        <h2>
            Welcome to Online Quiz Portal
        </h2>

        <p class="text-muted">
            Manage quizzes quickly and efficiently.
        </p>

    </div>

    <div class="row">

        <!-- Quiz Management -->
        <div class="col-md-4 mb-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Quiz Management</h3>

                    <p>
                        Create, view and delete quizzes.
                    </p>

                    <a th:href="@{/quiz}" class="btn btn-success">
                        Go to Quiz
                    </a>

                </div>

            </div>

        </div>

        <!-- Total Quizzes -->
        <div class="col-md-4 mb-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Total Quizzes</h3>

                    <h1>10</h1>

                    <p class="text-muted">
                        Total quizzes available.
                    </p>

                </div>

            </div>

        </div>

        <!-- Students -->
        <div class="col-md-4 mb-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Students</h3>

                    <h1>100</h1>

                    <p class="text-muted">
                        Registered students.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
