<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/style.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="#">
            Online Quiz Portal
        </a>

        <div>

            <a href="/quiz" class="btn btn-primary">
                Manage Quiz
            </a>

            <a href="/" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Quiz Management</h3>

                    <p>Create, Update and Delete Quizzes</p>

                    <a href="/quiz" class="btn btn-success">
                        Go to Quiz
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Total Quizzes</h3>

                    <h1>10</h1>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Students</h3>

                    <h1>100</h1>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
